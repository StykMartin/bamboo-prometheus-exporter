name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      MAVEN_OPTS: -Xmx512m

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Cache Atlassian Plugin SDK
        id: cache-sdk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: opt/atlassian-plugin-sdk
          key: atlassian-plugin-sdk-${{ runner.os }}-v1

      - name: Install Atlassian Plugin SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: ./setup-atlassian-sdk.sh "$GITHUB_WORKSPACE"

      - name: Add SDK to PATH
        run: echo "$GITHUB_WORKSPACE/opt/atlassian-plugin-sdk/bin" >> "$GITHUB_PATH"

      - name: Package plugin
        run: atlas-package

      - name: Upload plugin artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: prom-bamboo-exporter
          path: target/*.jar
          if-no-files-found: error
