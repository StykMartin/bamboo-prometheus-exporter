name: Release

on:
  push:
    tags: ['v*']

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      MAVEN_OPTS: -Xmx512m

    steps:
      - name: Checkout tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag $TAG does not look like vSEMVER (e.g. v1.2.3, v2.0.0-rc1)" >&2
            exit 1
          fi
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Set up JDK 21
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven repository
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Verify pom version matches tag
        run: |
          POM_VERSION=$(mvn -B -q -Dexpression=project.version -DforceStdout help:evaluate)
          if [ "$POM_VERSION" != "$VERSION" ]; then
            echo "pom.xml version ($POM_VERSION) does not match tag ($VERSION). Bump pom.xml before tagging." >&2
            exit 1
          fi

      - name: Cache Atlassian Plugin SDK
        id: cache-sdk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: opt/atlassian-plugin-sdk
          key: atlassian-plugin-sdk-${{ runner.os }}-v1

      - name: Install Atlassian Plugin SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: ./setup-atlassian-sdk.sh "$GITHUB_WORKSPACE"

      - name: Add SDK to PATH
        run: echo "$GITHUB_WORKSPACE/opt/atlassian-plugin-sdk/bin" >> "$GITHUB_PATH"

      - name: Package plugin
        run: atlas-package

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: target/prom-bamboo-exporter-${{ env.VERSION }}.jar

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            target/prom-bamboo-exporter-"$VERSION".jar
